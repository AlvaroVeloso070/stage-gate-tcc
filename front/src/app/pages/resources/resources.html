<div class="card flex flex-col gap-8">
    <div>
        <p class="font-bold text-2xl">Biblioteca de Recursos</p>
        <p class="text-muted-color">Diretrizes, normas e templates para seu TCC</p>
    </div>

    <div>
        <div class="mb-3">
            <p-button
                icon="pi pi-plus"
                label="Expandir tudo"
                (onClick)="expandAll()"
                class="mr-2" />
            <p-button
                icon="pi pi-minus"
                label="Recolher tudo"
                (onClick)="collapseAll()" />
        </div>
        <p-tree [value]="files()"
                class="w-full md:w-[30rem]"
                selectionMode="single"
                [(selection)]="selectedFile"
                [contextMenu]="cm"
                [filter]="true"
                filterPlaceholder="Pesquise por um arquivo..."/>
        <p-context-menu #cm [model]="items" />
    </div>
</div>
