<div class="card flex flex-col gap-3">
    <div>
        <p class="card-title">Professores</p>
        <p class="text-muted-color">Veja informações de professores, como reuniões e horários disponíveis</p>
    </div>

    <div class="table-wrapper">
        <p-table [value]="professors"
                 #dt
                 stripedRows
                 [paginator]="true"
                 [rows]="10"
                 [rowsPerPageOptions]="[10, 20, 30]"
                 [showCurrentPageReport]="true"
                 currentPageReportTemplate="Exibindo {first} à {last} de {totalRecords} registros.">

            <ng-template #header>
                <tr>
                    <th pSortableColumn="name">
                        Nome
                        <p-columnFilter type="text" field="name" display="menu" matchMode="contains"/>
                        <p-sortIcon field="name"/>
                    </th>

                    <th pSortableColumn="email" class="text-center!">
                        Email
                        <p-columnFilter type="text" field="email" display="menu" matchMode="contains"/>
                        <p-sortIcon field="email"/>
                    </th>

                    <th style="width: 5rem"></th>
                </tr>
            </ng-template>

            <ng-template #body let-professor>
                <tr>
                    <td>{{professor.name}}</td>
                    <td class="text-center!">{{professor.email}}</td>
                    <td class="flex flex-row gap-2">
                        <p-button icon="pi pi-search" [rounded]="true" severity="secondary" size="small" pTooltip="Consultar professor" tooltipPosition="top" (click)="consutProfessor(professor)"></p-button>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</div>
