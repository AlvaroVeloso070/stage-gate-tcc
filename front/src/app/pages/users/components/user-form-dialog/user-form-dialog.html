<div class="flex flex-col gap-8">
    <div class="flex flex-col gap-2">
        <label for="name">Nome</label>
        <input pInputText id="name" [(ngModel)]="user.name">
    </div>

    <div class="flex flex-col gap-2">
        <label for="email">Email</label>
        <input pInputText id="email" [(ngModel)]="user.email">
    </div>

    <div class="flex flex-col gap-2">
        <label for="userType">Tipo de Usuário</label>
        <p-select [options]="userTypeOptions"
                  optionValue="value"
                  optionLabel="label"
                  id="userType"
                  appendTo="body"
                  [(ngModel)]="user.type">
        </p-select>
    </div>

    <div class="flex flex-row justify-end gap-2">
        <p-button severity="secondary" label="Cancelar" (click)="close()"></p-button>
        <p-button severity="primary" [label]="isEditing() ? 'Salvar' : 'Incluir'" (click)="save()"></p-button>
    </div>

</div>
