<div class="card flex flex-col gap-8">
    <div>
        <p class="card-title">Gerenciamento de Usuários</p>
        <p class="text-muted-color">Gerencie todos os usuários do sistema</p>
    </div>

    <div>
        <p-button severity="primary" label="Novo Usuário" icon="pi pi-plus" (onClick)="newUser()"> </p-button>
    </div>

    <div class="table-wrapper">
        <p-table [value]="users"
                 #dt
                 stripedRows
                 [paginator]="true"
                 [rows]="10"
                 [rowsPerPageOptions]="[10, 20, 30]"
                 [showCurrentPageReport]="true"
                 currentPageReportTemplate="Exibindo {first} à {last} de {totalRecords} registros.">

            <ng-template #header>
                <tr>
                    <th pSortableColumn="name">
                        Nome
                        <p-columnFilter type="text" field="name" display="menu" matchMode="contains"/>
                        <p-sortIcon field="name"/>
                    </th>

                    <th pSortableColumn="email" class="text-center!">
                        Email
                        <p-columnFilter type="text" field="email" display="menu" matchMode="contains"/>
                        <p-sortIcon field="email"/>
                    </th>

                    <th pSortableColumn="type" class="text-center!">
                        Status
                        <p-columnFilter field="type" matchMode="equals" display="menu">
                            <ng-template #filter let-value let-filter="filterCallback">
                                <p-select [ngModel]="value"
                                          [options]="userTypeOptions"
                                          (onChange)="filter($event.value)"
                                          placeholder="Selecione um tipo de usuário"
                                          class="w-full"
                                          optionLabel="label"
                                          optionValue="value">
                                    <ng-template let-option #item>
                                        <tag-user-type [userType]="option.value"></tag-user-type>
                                    </ng-template>
                                </p-select>
                            </ng-template>
                        </p-columnFilter>
                        <p-sortIcon field="type"/>
                    </th>

                    <th style="width: 5rem"></th>
                </tr>
            </ng-template>

            <ng-template #body let-user>
                <tr>
                    <td>{{user.name}}</td>
                    <td class="text-center!">{{user.email}}</td>
                    <td class="text-center!"><tag-user-type [userType]="user.type"></tag-user-type></td>
                    <td class="flex flex-row gap-2">
                        <p-button icon="pi pi-pencil" [rounded]="true" severity="secondary" size="small" (onClick)="edit(user)" pTooltip="Editar usuário" tooltipPosition="top"> </p-button>
                        <p-button icon="pi pi-trash" [rounded]="true" severity="danger" size="small" (onClick)="delete(user)" pTooltip="Excluir usuário" tooltipPosition="top"> </p-button>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</div>

<p-confirmDialog></p-confirmDialog>
