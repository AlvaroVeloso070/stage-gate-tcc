<div class="card mb-0 h-full cursor-pointer flex flex-col gap-4" (click)="onViewDetails()">
    <div class="flex justify-between mb-2 h-full">
        <div>
            <span class="block text-muted-color font-medium mb-4">{{ metricName() }}</span>
            <div class="text-surface-900 dark:text-surface-0 font-medium text-xl">
                {{ metricValue() ? metricValue() : '-' }}
            </div>
        </div>
        <div
            class="flex items-center justify-center rounded-border"
            [ngClass]="{
                'bg-blue-100 dark:bg-blue-400/10': iconColor() === 'blue',
                'bg-green-100 dark:bg-green-400/10': iconColor() === 'green',
                'bg-orange-100 dark:bg-orange-400/10': iconColor() === 'orange',
                'bg-red-100 dark:bg-red-400/10': iconColor() === 'red',
                'bg-purple-100 dark:bg-purple-400/10': iconColor() === 'purple',
                'bg-pink-100 dark:bg-pink-400/10': iconColor() === 'pink',
                'bg-indigo-100 dark:bg-indigo-400/10': iconColor() === 'indigo',
                'bg-cyan-100 dark:bg-cyan-400/10': iconColor() === 'cyan',
                'bg-teal-100 dark:bg-teal-400/10': iconColor() === 'teal',
                'bg-yellow-100 dark:bg-yellow-400/10': iconColor() === 'yellow'
            }"
            style="width: 2.5rem; height: 2.5rem">
            <i
                class="pi text-xl!"
                [ngClass]="{
                    'text-blue-500': iconColor() === 'blue',
                    'text-green-500': iconColor() === 'green',
                    'text-orange-500': iconColor() === 'orange',
                    'text-red-500': iconColor() === 'red',
                    'text-purple-500': iconColor() === 'purple',
                    'text-pink-500': iconColor() === 'pink',
                    'text-indigo-500': iconColor() === 'indigo',
                    'text-cyan-500': iconColor() === 'cyan',
                    'text-teal-500': iconColor() === 'teal',
                    'text-yellow-500': iconColor() === 'yellow',
                    'pi-video': icon() === 'video',
                    'pi-chart-line': icon() === 'chart-line',
                    'pi-calendar-clock': icon() === 'calendar-clock',
                    'pi-exclamation-triangle': icon() === 'exclamation-triangle'
                }"></i>
        </div>
    </div>
    <div class="border-t border-surface-200 dark:border-surface-700">
        <span class="text-sm font-medium text-muted-color">
            Clique para ver
        </span>
    </div>
</div>
