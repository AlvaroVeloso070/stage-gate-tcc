<div class="card flex flex-col gap-8">
    <div>
        <p class="font-bold text-2xl">Reuniões</p>
    </div>


    <p-table [value]="meetingsList" stripedRows
             [paginator]="true"
             [rows]="10"
             [rowsPerPageOptions]="[10, 20, 30]"
             [showCurrentPageReport]="true"
             [scrollable]="true"
             scrollHeight="65vh"
             currentPageReportTemplate="Exibindo {first} à {last} de {totalRecords} registros.">
        <ng-template #header>
            <tr>
                <th pSortableColumn="projectTitle">Projeto <p-sortIcon field="projectTitle"/></th>
                <th pSortableColumn="professorName" class="text-center!">Docente <p-sortIcon field="professorName"/></th>
                <th pSortableColumn="scheduleDate" class="text-center!">Data <p-sortIcon field="scheduleDate"/></th>
                <th pSortableColumn="startTime" class="text-center!">Horário <p-sortIcon field="startTime"/></th>
                <th class="text-center!">Stage / Gate</th>
                <th pSortableColumn="status" class="text-center!">Status <p-sortIcon field="status"/></th>
                <th style="width: 5rem"></th>
            </tr>
        </ng-template>
        <ng-template #body let-meeting>
            <tr>
                <td>{{ meeting.projectTitle }}</td>
                <td class="text-center!">{{ meeting.professorName }}</td>
                <td class="text-center!">{{ meeting.scheduleDate }}</td>
                <td class="text-center!">{{ `${meeting.startTime} - ${meeting.endTime}` }}</td>
                <td class="text-center!">{{ `${meeting.type} ${meeting.stageGateNumber}` }}</td>
                <td class="text-center!"><tag-meeting-status [status]="meeting.status"></tag-meeting-status></td>
                <td>
                    <p-button icon="pi pi-search" severity="secondary" rounded />
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>
