<div class="card flex flex-col gap-8">
    <div>
        <p class="card-title">Reuniões</p>
    </div>


    <p-table [value]="meetingsList"
             #dt
             stripedRows
             [paginator]="true"
             [rows]="10"
             [rowsPerPageOptions]="[10, 20, 30]"
             [showCurrentPageReport]="true"
             [scrollable]="true"
             scrollHeight="65vh"
             currentPageReportTemplate="Exibindo {first} à {last} de {totalRecords} registros.">
        <ng-template #header>
            <tr>
                <th pSortableColumn="projectTitle">
                    Projeto
                    <p-columnFilter type="text" field="projectTitle" display="menu" matchMode="contains" />
                    <p-sortIcon field="projectTitle"/>
                </th>
                <th class="text-center!" pSortableColumn="professorName">
                    Docente
                    <p-columnFilter type="text" field="professorName" display="menu"/>
                    <p-sortIcon field="professorName"/>
                </th>
                <th class="text-center!" pSortableColumn="scheduleDate">
                    Data
                    <p-columnFilter field="scheduleDate" display="menu" type="date"></p-columnFilter>
                    <p-sortIcon field="scheduleDate"/>
                </th>
                <th class="text-center!">
                    Horário
                </th>
                <th class="text-center!" pSortableColumn="stageGateNumber">
                    Stage / Gate
                    <p-sortIcon field="stageGateNumber"/>
                </th>
                <th class="text-center!" pSortableColumn="status">
                    Status
                    <p-columnFilter field="status" matchMode="equals" display="menu">
                        <ng-template #filter let-value let-filter="filterCallback">
                            <p-select [ngModel]="value"
                                      [options]="statuses"
                                      (onChange)="filter($event.value)"
                                      optionLabel="label"
                                      optionValue="value"
                                      placeholder="Selecione um status"
                                      class="w-full">
                                <ng-template let-option #item>
                                    <tag-meeting-status [status]="option.value"></tag-meeting-status>
                                </ng-template>
                            </p-select>
                        </ng-template>
                    </p-columnFilter>
                    <p-sortIcon field="status"/>
                </th>
                <th style="width: 5rem"></th>
            </tr>
        </ng-template>
        <ng-template #body let-meeting>
            <tr>
                <td>{{ meeting.projectTitle }}</td>
                <td class="text-center!">{{ meeting.professorName }}</td>
                <td class="text-center!">{{ meeting.scheduleDate | date:'shortDate' }}</td>
                <td class="text-center!">{{ `${meeting.startTime} - ${meeting.endTime}` }}</td>
                <td class="text-center!">{{ `${meeting.type} ${meeting.stageGateNumber}` }}</td>
                <td class="text-center!"><tag-meeting-status [status]="meeting.status"></tag-meeting-status></td>
                <td>
                    <p-button icon="pi pi-search" severity="secondary" rounded />
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>
