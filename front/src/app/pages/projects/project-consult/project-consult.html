<div class="card flex flex-col gap-8">
    <div>
        <p class="font-bold text-2xl">Projeto: {{ project.title }}</p>
    </div>

    <div>
        <gates-progress-stepper [activeStep]="activeGate()" [isAllGatesCompleted]="isAllGatesCompleted()"></gates-progress-stepper>
    </div>

    <div class="flex flex-col gap-2">
        <div>
            <span class="font-bold">Pergunta de pesquisa: </span>
            <span>{{project.researchQuestion}}</span>
        </div>

        <div>
            <span class="font-bold">Membros do grupo: </span>
            <span>{{getGroupMembers(project)}}</span>
        </div>

        <div>
            <span class="font-bold">Data de início: </span>
            <span>{{project.startDate}}</span>
        </div>
    </div>
</div>

<div class="card flex flex-col gap-8">
    <div>
        <p class="font-bold text-2xl">Histórico de reuniões</p>
    </div>

    <div>
        componente histórico de reuniões
    </div>
</div>
