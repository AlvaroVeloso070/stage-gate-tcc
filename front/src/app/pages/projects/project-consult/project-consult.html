@if (project) {
<div class="project-header">
    <div class="project-title">{{ project.title }}</div>
    <div class="project-subtitle">Detalhes e acompanhamento do projeto</div>
</div>

<div class="progress-section">
    <div class="progress-card">
        <div class="progress-title">Progresso dos Gates</div>
        <gates-progress-stepper [activeStep]="activeGate()" [isAllGatesCompleted]="isAllGatesCompleted()"></gates-progress-stepper>
    </div>
</div>

<div class="tabs-section">
    <div class="custom-tabs">
        <p-tabs [value]="TABS.PROGRESS">
            <p-tablist>
                <p-tab [value]="TABS.PROGRESS">
                    <i class="pi pi-chart-line mr-2"></i>
                    Andamento do Projeto
                </p-tab>
                <p-tab [value]="TABS.MEETINGS">
                    <i class="pi pi-calendar mr-2"></i>
                    Reuniões
                </p-tab>
            </p-tablist>
            <p-tabpanels>
                <p-tabpanel [value]="TABS.PROGRESS">
                    <project-progress [project]="project" [activeGate]="activeGate()"></project-progress>
                </p-tabpanel>
                <p-tabpanel [value]="TABS.MEETINGS">
                    <project-meetings [projectId]="project.id"></project-meetings>
                </p-tabpanel>
            </p-tabpanels>
        </p-tabs>
    </div>
</div>
}
