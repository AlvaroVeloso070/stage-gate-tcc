@if (project) {
    <div class="card flex flex-col gap-8">
        <div>
            <p class="card-title font-bold text-2xl">{{ project.title }}</p>
            <p class="text-muted-color">Detalhes e acompanhamento do projeto</p>
        </div>

        <div class="flex flex-col gap-2">
            <div>
                <span class="font-bold">Pergunta de pesquisa: </span>
                <span>{{project.researchQuestion}}</span>
            </div>

            <div>
                <span class="font-bold">Membros do grupo: </span>
                <span>{{getGroupMembers(project)}}</span>
            </div>

            <div>
                <span class="font-bold">Data de início: </span>
                <span>{{project.startDate | date:'longDate'}}</span>
            </div>
            <div>
                <span class="font-bold">Status: </span>
                <span><tag-project-status [status]="project.status"></tag-project-status></span>
            </div>
        </div>
    </div>

    <div class="card flex flex-col gap-8">
        <div class="card-title text-2xl font-bold">Progresso dos Gates</div>
        <gates-progress-stepper [activeStep]="activeGate()" [isAllGatesCompleted]="isAllGatesCompleted()"></gates-progress-stepper>
    </div>

    <div class="card flex flex-col gap-8">
        <p-tabs [value]="TABS.PROGRESS">
            <p-tablist>
                <p-tab [value]="TABS.PROGRESS">
                    <i class="pi pi-chart-line mr-2"></i>
                    Andamento do Projeto
                </p-tab>
                <p-tab [value]="TABS.MEETINGS">
                    <i class="pi pi-calendar mr-2"></i>
                    Reuniões
                </p-tab>
            </p-tablist>
            <p-tabpanels>
                <p-tabpanel [value]="TABS.PROGRESS">
                    <project-progress [project]="project" [activeGate]="activeGate()"></project-progress>
                </p-tabpanel>
                <p-tabpanel [value]="TABS.MEETINGS">
                    <project-meetings [projectId]="project.id"></project-meetings>
                </p-tabpanel>
            </p-tabpanels>
        </p-tabs>
    </div>
}
