<div class="card flex flex-col gap-3">
    <div class="flex justify-between items-center">
        <p class="font-bold text-2xl">Projetos</p>
    </div>

    <div class="table-wrapper">
        <p-table [value]="projects"
                 stripedRows
                 [paginator]="true"
                 [rows]="10"
                 [rowsPerPageOptions]="[10, 20, 30]"
                 [showCurrentPageReport]="true"
                 currentPageReportTemplate="Exibindo {first} à {last} de {totalRecords} registros.">
            <ng-template #header>
                <tr>
                    <th pSortableColumn="title">
                        Titulo
                        <p-columnFilter type="text" field="title" display="menu" matchMode="contains"/>
                        <p-sortIcon field="title"/>
                    </th>
                    <th pSortableColumn="groupMembers" class="text-center!">
                        Membros
                        <p-columnFilter type="text" field="groupMembers" display="menu" matchMode="contains"/>
                        <p-sortIcon field="groupMembers"/>
                    </th>
                    <th pSortableColumn="currentGateNumber" class="text-center!">
                        Gate Atual
                        <p-columnFilter field="currentGateNumber" matchMode="equals" display="menu">
                            <ng-template #filter let-value let-filter="filterCallback">
                                <p-select [ngModel]="value"
                                          [options]="gateOptions"
                                          (onChange)="filter($event.value)"
                                          placeholder="Selecione um Gate"
                                          class="w-full"
                                          optionLabel="label"
                                          optionValue="value">
                                </p-select>
                            </ng-template>
                        </p-columnFilter>
                        <p-sortIcon field="currentGateNumber"/>
                    </th>
                    <th pSortableColumn="dueDate" class="text-center!">
                        Prazo
                        <p-columnFilter field="dueDate" display="menu" type="date"></p-columnFilter>
                        <p-sortIcon field="dueDate"/>
                    </th>
                    <th pSortableColumn="dueDateStatus" class="text-center!">
                        Status
                        <p-columnFilter field="dueDateStatus" matchMode="equals" display="menu">
                            <ng-template #filter let-value let-filter="filterCallback">
                                <p-select [ngModel]="value"
                                          [options]="dueStatusOptions"
                                          (onChange)="filter($event.value)"
                                          placeholder="Selecione um Status"
                                          class="w-full"
                                          optionLabel="label"
                                          optionValue="value">
                                    <ng-template let-option #item>
                                        <tag-project-due-status [status]="option.value"></tag-project-due-status>
                                    </ng-template>
                                </p-select>
                            </ng-template>
                        </p-columnFilter>
                        <p-sortIcon field="dueDateStatus"/>
                    </th>
                    <th style="width: 5rem"></th>
                </tr>
            </ng-template>
            <ng-template #body let-project>
                <tr>
                    <td>{{ project.title }}</td>
                    <td class="text-center!">{{ project.groupMembers.length > 0 ? project.groupMembers.join(', ') : '-' }}</td>
                    <td class="text-center!">{{ project.currentGateNumber ? 'Gate ' + project.currentGateNumber : '-' }}</td>
                    <td class="text-center!">{{ project.dueDate ? (project.dueDate | date:'shortDate') : '-' }}</td>
                    <td class="text-center!"><tag-project-due-status [status]="project.dueDateStatus"></tag-project-due-status></td>
                    <td>
                        <p-button icon="pi pi-search" severity="secondary" rounded (click)="consultProject(project)"/>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</div>
