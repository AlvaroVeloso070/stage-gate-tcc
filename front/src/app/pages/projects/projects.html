<div class="card flex flex-col gap-8">
    <div>
        <p class="font-bold text-2xl">Projetos</p>
    </div>


    <p-table [value]="projects" stripedRows
             [paginator]="true"
             [rows]="10"
             [rowsPerPageOptions]="[10, 20, 30]"
             [showCurrentPageReport]="true"
             [scrollable]="true"
             scrollHeight="65vh"
             currentPageReportTemplate="Exibindo {first} à {last} de {totalRecords} registros.">
        <ng-template #header>
            <tr>
                <th pSortableColumn="title">Titulo <p-sortIcon field="title"/></th>
                <th pSortableColumn="groupMembers" class="text-center!">Membros <p-sortIcon field="groupMembers"/></th>
                <th pSortableColumn="currentGateNumber" class="text-center!">Gate Atual <p-sortIcon field="currentGateNumber"/></th>
                <th pSortableColumn="dueDate" class="text-center!">Prazo <p-sortIcon field="dueDate"/></th>
                <th pSortableColumn="dueDateStatus" class="text-center!">Status <p-sortIcon field="dueDateStatus"/></th>
                <th style="width: 5rem"></th>
            </tr>
        </ng-template>
        <ng-template #body let-project>
            <tr>
                <td>{{ project.title }}</td>
                <td class="text-center!">{{ project.groupMembers.length > 0 ? project.groupMembers.join(', ') : '-' }}</td>
                <td class="text-center!">{{ project.currentGateNumber ? 'Gate ' + project.currentGateNumber : '-' }}</td>
                <td class="text-center!">{{ project.dueDate ? (project.dueDate | date:'shortDate') : '-' }}</td>
                <td class="text-center!"><tag-project-due-status [status]="project.dueDateStatus"></tag-project-due-status></td>
                <td>
                    <p-button icon="pi pi-search" severity="secondary" rounded (click)="consultProject(project)"/>
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>
