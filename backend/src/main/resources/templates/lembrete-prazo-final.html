<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lembrete de Prazo Final</title>
</head>
<body>
    <p>Olá, <span th:text="${userName}"></span>!</p>
    <p>Este é um lembrete de que o prazo final para o próximo gate do seu projeto "<span th:text="${projectName}"></span>" está se aproximando.</p>
    <p>A data final para a entrega é <span th:text="${dueDate}"></span>.</p>
    <p>Atenciosamente,</p>
    <p>Equipe Stage Gate</p>
</body>
</html>
