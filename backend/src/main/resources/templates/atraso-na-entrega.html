<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Atraso na entrega do projeto</title>
</head>
<body>
<p>Olá, <span th:text="${userName}"></span>!</p>
<p>Este é um aviso de que seu projeto "<span th:text="${projectName}"></span>" se encontra <strong>ATRASADO</strong> para aprovação no próximo gate.</p>
<p>A data final para a entrega esperada era <span th:text="${dueDate}"></span>.</p>
<p>Atenciosamente,</p>
<p>Equipe Stage Gate</p>
</body>
</html>
